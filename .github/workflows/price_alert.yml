name: Crypto Price Alert

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-price:
    runs-on: ubuntu-latest
    outputs:
      should_notify: ${{ steps.check.outputs.should_notify }}
      price_info: ${{ steps.check.outputs.price_info }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        id: check
        run: python check_price.py

      - name: Send mail
        if: steps.check.outputs.should_notify == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_SENDER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "【币价预警】Bitcoin 状态更新"
          to: ${{ secrets.EMAIL_RECEIVER }}
          from: GitHub Actions Alert
          body: ${{ steps.check.outputs.price_info }}
